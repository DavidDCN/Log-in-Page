<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Basic Auth Project</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1e1e24; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background-color: #2a2a35; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); width: 300px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #444; background: #1e1e24; color: white; border-radius: 4px; }
        button { width: 98%; padding: 10px; margin: 10px 0; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-primary { background-color: #007bff; color: white; }
        .btn-danger { background-color: #dc3545; color: white; }
        .hidden { display: none; }
        #message { margin-top: 15px; font-size: 14px; color: #ffc107; }
    </style>
</head>
<body>

    <div class="card">
        <div id="auth-panel">
            <h2 id="form-title">Login Portal</h2>
            <input type="text" id="username" placeholder="Enter Username">
            <input type="password" id="password" placeholder="Enter Password">
            
            <button class="btn-primary" onclick="handleAuth('login')">Log In</button>
            <button class="btn-primary" style="background:#28a745" onclick="handleAuth('signup')">Sign Up</button>
        </div>

        <div id="dashboard-panel" class="hidden">
            <h2>Welcome Home!</h2>
            <p>Logged in as: <strong id="user-display"></strong></p>
            <hr style="border-color:#444;">
            <button class="btn-danger" onclick="deleteAccount()">Delete My Account</button>
            <button class="btn-primary" style="background:#6c757d" onclick="logout()">Log Out</button>
        </div>

        <div id="message"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let loggedInUser = '';

        async function handleAuth(action) {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const msgBox = document.getElementById('message');

            if (!username || !password) {
                msgBox.innerText = 'Please fill out both fields.';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/${action}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                msgBox.innerText = data.message;

                if (response.ok && action === 'login') {
                    loggedInUser = data.user;
                    switchToDashboard();
                }
            } catch (err) {
                msgBox.innerText = 'Cannot connect to backend server.';
            }
        }

        async function deleteAccount() {
            if (!confirm('Are you absolutely sure you want to permanently delete your account?')) return;

            try {
                const response = await fetch(`${API_URL}/delete-account`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: loggedInUser })
                });
                const data = await response.json();
                alert(data.message);
                logout();
            } catch (err) {
                alert('Failed to drop account record.');
            }
        }

        function switchToDashboard() {
            document.getElementById('auth-panel').classList.add('hidden');
            document.getElementById('dashboard-panel').classList.remove('hidden');
            document.getElementById('user-display').innerText = loggedInUser;
            document.getElementById('message').innerText = '';
        }

        function logout() {
            loggedInUser = '';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('auth-panel').classList.remove('hidden');
            document.getElementById('dashboard-panel').classList.add('hidden');
            document.getElementById('message').innerText = '';
        }
    </script>
</body>
</html>
